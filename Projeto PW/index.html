<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaysandubaBet</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>PaysanBet</h1>
        <div class="saldo-container">
            Saldo: R$ <span id="saldo">1000</span>
        </div>
    </header>

    <section id="jogos">
        <h2>Quartas de Final - Champions League</h2>

        <div class="card-jogo">
            <img src="img/real.png">
            <h3>Real Madrid x Bayern Munich</h3>
            <img src="img/bayern.png">

            <button onclick="selecionarJogo('Real Madrid', 2.30)">
                Real Madrid (2.30)
            </button>

            <button onclick="selecionarJogo('Empate', 3.10)">
                Empate (3.10)
            </button>

            <button onclick="selecionarJogo('Bayern Munich', 2.40)">
                Bayern Munich (2.40)
            </button>
        </div>


        <div class="card-jogo">
            <img src="img/city.png">
            <h3>Manchester City x FC Barcelona</h3>
            <img src="img/barcelona.png">

            <button onclick="selecionarJogo('Manchester City', 1.95)">
                Manchester City (1.95)
            </button>

            <button onclick="selecionarJogo('Empate', 3.40)">
                Empate (3.40)
            </button>

            <button onclick="selecionarJogo('FC Barcelona', 3.60)">
                FC Barcelona (3.60)
            </button>
        </div>


        <div class="card-jogo">
            <img src="img/psg.png">
            <h3>Paris Saint-Germain x Inter Milan</h3>
            <img src="img/inter.png">

            <button onclick="selecionarJogo('Paris Saint-Germain', 2.10)">
                Paris Saint-Germain (2.10)
            </button>

            <button onclick="selecionarJogo('Empate', 3.20)">
                Empate (3.20)
            </button>

            <button onclick="selecionarJogo('Inter Milan', 3.10)">
                Inter Milan (3.10)
            </button>
        </div>


        <div class="card-jogo">
            <img src="img/arsenal.png">
            <h3>Arsenal x RB Leipzig</h3>
            <img src="img/leipzig.png">

            <button onclick="selecionarJogo('Arsenal', 1.65)">
                Arsenal (1.65)
            </button>

            <button onclick="selecionarJogo('Empate', 3.50)">
                Empate (3.50)
            </button>

            <button onclick="selecionarJogo('RB Leipzig', 4.50)">
                RB Leipzig (4.50)
            </button>
        </div>

    </section>

    <section id="area-aposta" style="display:none;">
        <h2>Fazer Aposta</h2>

        <p>Odd selecionada: <span id="oddSelecionada"></span></p>

        <label>Valor da aposta:</label>
        <input type="number" id="valorAposta" placeholder="Digite o valor">

        <button onclick="confirmarAposta()">Confirmar Aposta</button>
    </section>

    <section id="loading" style="display:none;">
        <h2>Simulando partida...</h2>
        <div class="spinner"></div>
    </section>

    <section id="resultado" style="display:none;">
        <h2 id="mensagemResultado"></h2>
        <button onclick="voltar()">Voltar</button>
    </section>

    <section id="historico">
        <h2>Histórico de Apostas</h2>
        <div id="listaHistorico"></div>
    </section>
</body>

</html>
